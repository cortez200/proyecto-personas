<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Administrar</title>
    <style>
        body { font-family: sans-serif; padding: 50px; background: #eee; }
        .box { background: white; padding: 20px; border-radius: 10px; shadow: 0 0 10px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background: #007bff; color: white; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Lista de Personas</h1>
        <a href="/">Volver al registro</a>
        <hr>
        <table>
            <thead>
                <tr>
                    <th>DNI</th>
                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody>
                {% for p in personas_list %}
                <tr>
                    <td>{{ p[1] }}</td>
                    <td>{{ p[2] }}</td>
                    <td>{{ p[3] }}</td>
                    <td>
                        <form action="/eliminar/{{ p[1] }}" method="POST">
                            <button type="submit" style="color:red;">Eliminar</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
